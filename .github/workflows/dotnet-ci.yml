name: .NET CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: PhotoFinder.Api

      - name: Build
        run: dotnet build --no-restore
        working-directory: PhotoFinder.Api

      - name: Run tests
        run: dotnet test --no-build
        working-directory: PhotoFinder.Api